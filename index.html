<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dental AI Assistant</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #d9f0ff, #eef7ff);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .chat-container {
      width: 380px;
      height: 600px;
      background: #fff;
      border-radius: 20px;
      display: flex;
      flex-direction: column;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      overflow: hidden;
    }

    .header {
      background: #0077b6;
      color: white;
      padding: 15px;
      text-align: center;
      font-weight: bold;
      font-size: 18px;
    }

    .chat-box {
      flex: 1;
      padding: 15px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .message {
      padding: 10px 14px;
      border-radius: 15px;
      max-width: 75%;
      font-size: 14px;
    }

    .bot {
      background: #e9ecef;
      align-self: flex-start;
    }

    .user {
      background: #0077b6;
      color: white;
      align-self: flex-end;
    }

    .footer {
      display: flex;
      border-top: 1px solid #ddd;
    }

    input {
      flex: 1;
      border: none;
      padding: 12px;
      font-size: 14px;
      outline: none;
    }

    button {
      background: #0077b6;
      color: white;
      border: none;
      padding: 12px 16px;
      cursor: pointer;
    }

    button:hover {
      background: #005f8a;
    }
  </style>
</head>

<body>

<div class="chat-container">
  <div class="header">🦷 Dental AI Assistant</div>

  <div class="chat-box" id="chatBox"></div>

  <div class="footer">
    <input type="text" id="input" placeholder="Type your message..." />
    <button onclick="sendMessage()">Send</button>
  </div>
</div>

<script>
  const chatBox = document.getElementById("chatBox");

  function speak(text) {
    if ('speechSynthesis' in window) {
      const speech = new SpeechSynthesisUtterance(text);
      speech.lang = "en-US";
      window.speechSynthesis.speak(speech);
    }
  }

  function addMessage(text, sender) {
    const div = document.createElement("div");
    div.classList.add("message", sender);
    div.innerText = text;
    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
  }

  function botReply(text) {
    addMessage(text, "bot");
    speak(text);
  }

  function sendMessage() {
    const input = document.getElementById("input");
    const text = input.value.trim();

    if (text === "") return;

    addMessage(text, "user");
    input.value = "";

    setTimeout(() => {
      handleAI(text);
    }, 800);
  }

  // Simple AI Logic
  let step = 0;
  let userData = {};

  function handleAI(text) {
    text = text.toLowerCase();

    if (step === 0) {
      if (text.includes("appointment") || text.includes("book")) {
        step = 1;
        botReply("May I have your full name, please?");
      } else {
        botReply("I can help you book an appointment. Please say 'book appointment'.");
      }
    }

    else if (step === 1) {
      userData.name = text;
      step = 2;
      botReply("What date would you prefer?");
    }

    else if (step === 2) {
      userData.date = text;
      step = 3;
      botReply("What time works best for you?");
    }

    else if (step === 3) {
      userData.time = text;
      step = 4;
      botReply(`Great ${userData.name}, your appointment is booked on ${userData.date} at ${userData.time}.`);
    }

    else {
      botReply("Your session is complete. Thank you!");
    }
  }

  // Enter key support
  document.getElementById("input").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
      sendMessage();
    }
  });

  // Initial greeting
  window.onload = () => {
    botReply("Hello, thank you for calling Healthcare on Collins. How can I help you today?");
  };
</script>

</body>
</html>
